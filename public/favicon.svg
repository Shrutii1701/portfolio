<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offset wireframe for neubrutalistic depth -->
  <rect x="25" y="25" width="462" height="462" rx="40" fill="#a29bfe" stroke="none" opacity="1"/>
  
  <!-- Main Neubrutalistic card -->
  <rect x="0" y="0" width="487" height="487" rx="40" fill="#1a1a2e" stroke="#0f0f1a" stroke-width="0"/>
  
  <!-- Border stroke -->
  <rect x="15" y="15" width="462" height="462" rx="30" fill="none" stroke="#a29bfe" stroke-width="8" opacity="0.3"/>
  
  <!-- "sm" text in bold neubrutalistic style -->
  <text x="246" y="320" 
        font-family="Arial Black, sans-serif" 
        font-size="220" 
        font-weight="900" 
        fill="#e0e5ec" 
        text-anchor="middle"
        letter-spacing="-12">sm</text>
  
  <!-- Accent underline -->
  <rect x="96" y="360" width="300" height="12" rx="6" fill="#6c5ce7"/>
</svg>
